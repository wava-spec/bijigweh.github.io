<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.signup-link{
text-align:center;
margin-top:10px;
font-size:14px;
}

.error{
color:red;
font-size:13px;
text-align:center;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<p class="error" id="error"></p>

<button type="submit">Login</button>

</form>

<div class="signup-link">
Belum punya akun? <a href="signup.html">Daftar</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let error = document.getElementById("error");

if(email === "admin@email.com" && password === "123456"){
alert("Login berhasil!");
window.location.href = "dashboard.html";
}else{
error.textContent = "Email atau password salah!";
}

});

</script>

</body>
</html>
