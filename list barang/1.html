<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokopedia Style List</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Container Utama */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        /* Card Barang */
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Pengaturan Gambar agar Pas dengan Kotak */
        .image-container {
            width: 100%;
            height: 200px; /* Tinggi kotak gambar */
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* KUNCI: Gambar akan memenuhi kotak secara proporsional */
            display: block;
        }

        .info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title {
            font-size: 14px;
            height: 38px;
            line-height: 19px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Maksimal 2 baris teks */
            -webkit-box-orient: vertical;
            color: #212121;
        }

        .price {
            font-weight: bold;
            font-size: 16px;
            color: #fa591d;
            margin: 4px 0;
        }

        .location {
            font-size: 12px;
            color: #6d7588;
            display: flex;
            align-items: center;
        }

        .rating {
            font-size: 11px;
            color: #6d7588;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
    </style>
</head>
<body>

<div class="product-grid">
    <div class="card">
        <div class="image-container">
            <img src="https://3.bp.blogspot.com/-10gVPmO_56c/V2ZRALZ1PBI/AAAAAAAAG-I/5XlMUYUOO5Q8OKeaaeuNL3SswTif53KewCLcB/s1600/model%2Bbaju%2Bvintage%2B2016.jpg" alt="Keyboard">
        </div>
        <div class="info">
            <div class="title">Baju Vintage cewek</div>
            <div class="price">Rp1.750.000</div>
            <div class="location">Bergas</div>
            <div class="rating">⭐ 5 | Terjual 1rb+</div>
        </div>
    </div>

    <div class="card">
        <div class="image-container">
            <img src="https://champiro.id/wp-content/uploads/2024/09/caade8c9eb140b9693baa946aacd8519_result.webp" alt="Mouse">
        </div>
        <div class="info">
            <div class="title">Baju Vintage cowok</div>
            <div class="price">Rp1.650.000</div>
            <div class="location">Bergas</div>
            <div class="rating">⭐ 5 | Terjual 500+</div>
        </div>
    </div>

    <div class="card">
        <div class="image-container">
            <img src="https://tse2.mm.bing.net/th/id/OIP.VG2Td2v43ViC6ei8NY2qiAHaLH?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Monitor">
        </div>
        <div class="info">
            <div class="title">Baju Model Fashion Show hitam </div>
            <div class="price">Rp3.850.000</div>
            <div class="location">Bergas</div>
            <div class="rating">⭐ 5 | Terjual 100+</div>
        </div>
    </div>

    <div class="card">
        <div class="image-container">
            <img src="https://ozzakonveksi.com/wp-content/uploads/2021/10/Jaket-Parka-Keren.jpg" alt="Headset">
        </div>
        <div class="info">
            <div class="title">Jacket Musim Dingin</div>
            <div class="price">Rp1.850.000</div>
            <div class="location">Bergas</div>
            <div class="rating">⭐ 5 | Terjual 2rb+</div>
        </div>
    </div>

    <div class="card">
        <div class="image-container">
            <img src="https://down-id.img.susercontent.com/file/id-11134207-7r98y-lou4nu74ofaz9c" alt="Deskmat">
        </div>
        <div class="info">
            <div class="title">Kaos Mayhem Over Size</div>
            <div class="price">Rp150.000</div>
            <div class="location">Bergas</div>
            <div class="rating">⭐ 5 | Terjual 4rb+</div>
        </div>
    </div>
</div>

</body>
</html>
