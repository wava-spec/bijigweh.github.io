<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokopedia Style List</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Container Utama */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        /* Card Barang */
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }
        
        /* Pengaturan Gambar agar Pas dengan Kotak */
        .image-container {
            width: 100%;
            height: 200px; /* Tinggi kotak gambar */
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* KUNCI: Gambar akan memenuhi kotak secara proporsional */
            display: block;
        }

        .info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title {
            font-size: 14px;
            height: 38px;
            line-height: 19px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Maksimal 2 baris teks */
            -webkit-box-orient: vertical;
            color: #212121;
        }

        .price {
            font-weight: bold;
            font-size: 16px;
            color: #fa591d;
            margin: 4px 0;
        }

        .location {
            font-size: 12px;
            color: #6d7588;
            display: flex;
            align-items: center;
        }

        .rating {
            font-size: 11px;
            color: #6d7588;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
    </style>
</head>
<body>

<div class="product-grid">
    <div class="card">
        <div class="image-container">

        </div>
        <div class="info">

    <div class="card">
        <div class="image-container">

        </div>

    <div class="card">
